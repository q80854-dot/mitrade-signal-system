services:
  - type: web
    name: mitrade-signal-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: GROK_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ACCOUNT_BALANCE_USD
        value: "750"
      - key: FINNHUB_API_KEY
        sync: false
