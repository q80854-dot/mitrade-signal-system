<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mitrade AI Signal System v5.2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg1:#08080a;--bg2:#0e0e12;--bg3:#14141a;--bg4:#1a1a22;--bg5:#202028;
  --border:#1e1e28;--border2:#28283a;
  --t1:#f2f2f8;--t2:#8888aa;--t3:#44445a;
  --green:#22c55e;--gbg:rgba(34,197,94,.08);--gbrd:rgba(34,197,94,.25);
  --red:#ef4444;--rbg:rgba(239,68,68,.08);--rbrd:rgba(239,68,68,.25);
  --yellow:#f59e0b;--ybg:rgba(245,158,11,.08);--ybrd:rgba(245,158,11,.25);
  --blue:#60a5fa;--bbg:rgba(96,165,250,.08);--bbrd:rgba(96,165,250,.25);
  --purple:#a78bfa;--r-md:8px;--r-lg:12px;
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:13px;background:var(--bg1);color:var(--t2);line-height:1.5}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:210px;min-width:210px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;transition:width .2s}
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.logo-mark{display:flex;align-items:center;gap:8px}
.logo-icon{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#22c55e,#16a34a);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;color:#000;font-weight:700}
.logo-text{font-size:13px;font-weight:700;color:var(--t1)}
.logo-ver{font-size:9px;color:var(--t3);margin-top:2px;letter-spacing:.5px}
.nav-sec{padding:14px 12px 4px;font-size:9px;color:var(--t3);letter-spacing:1.2px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;margin:1px 6px;border-radius:var(--r-md);cursor:pointer;font-size:12px;color:var(--t3);transition:all .12s;user-select:none;border-left:2px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--t2)}
.nav-item.active{background:var(--bg3);color:var(--t1);border-left-color:var(--green)}
.nav-dot{width:5px;height:5px;border-radius:50%;background:var(--border2);flex-shrink:0;transition:background .2s}
.nav-dot.g{background:var(--green)}.nav-dot.r{background:var(--red)}.nav-dot.y{background:var(--yellow)}
.nav-divider{height:1px;background:var(--border);margin:6px 12px}
.sidebar-status{padding:12px 14px;margin-top:auto;border-top:1px solid var(--border);font-size:10px}
.status-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;color:var(--t3)}
.pulse{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.main{flex:1;overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:14px;background:var(--bg1)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px}
.card-sm{padding:12px 14px}
.card-title{font-size:9px;font-weight:600;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.metric{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px}
.metric-label{font-size:10px;color:var(--t3);margin-bottom:4px}
.metric-val{font-size:20px;font-weight:700;color:var(--t1);line-height:1.1}
.metric-sub{font-size:10px;color:var(--t3);margin-top:3px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g32{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.topbar-title{font-size:15px;font-weight:700;color:var(--t1)}
.topbar-right{display:flex;align-items:center;gap:8px}
.chip{font-size:10px;padding:3px 10px;border-radius:20px;border:1px solid var(--border2);color:var(--t3)}
.btn{background:var(--bg3);border:1px solid var(--border2);color:var(--t2);padding:5px 14px;border-radius:var(--r-md);cursor:pointer;font-size:11px;transition:all .12s;display:flex;align-items:center;gap:5px}
.btn:hover{background:var(--bg4);color:var(--t1)}.btn:active{transform:scale(.97)}
.btn-spin{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.alert{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--r-md);font-size:12px;margin-bottom:4px}
.a-ok{background:var(--gbg);border:1px solid var(--gbrd);color:var(--green)}
.a-warn{background:var(--ybg);border:1px solid var(--ybrd);color:var(--yellow)}
.a-danger{background:var(--rbg);border:1px solid var(--rbrd);color:var(--red)}
.a-info{background:var(--bbg);border:1px solid var(--bbrd);color:var(--blue)}
.sig-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px;transition:border-color .15s;margin-bottom:8px}
.sig-card:hover{border-color:var(--border2)}
.sig-card:last-child{margin-bottom:0}
.sig-dir{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.dir-b{background:var(--gbg);color:var(--green);border:1px solid var(--gbrd)}
.dir-s{background:var(--rbg);color:var(--red);border:1px solid var(--rbrd)}
.score-bar{height:3px;background:var(--bg5);border-radius:2px;overflow:hidden}
.score-fill{height:100%;border-radius:2px;transition:width .5s ease}
.badge{font-size:9px;padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:.3px}
.badge-b{background:var(--gbg);color:var(--green);border:1px solid var(--gbrd)}
.badge-s{background:var(--rbg);color:var(--red);border:1px solid var(--rbrd)}
.badge-hold{background:var(--ybg);color:var(--yellow);border:1px solid var(--ybrd)}
.macro-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.macro-row:last-child{border-bottom:none}
.up{color:var(--green)}.dn{color:var(--red)}.neu{color:var(--t3)}
.gauge-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)}
.gauge-row:last-child{border-bottom:none}
.gauge-label{font-size:11px;color:var(--t2);width:85px;flex-shrink:0}
.gauge-track{flex:1;height:5px;background:var(--bg5);border-radius:3px;overflow:hidden}
.gauge-fill{height:100%;border-radius:3px;transition:width .4s}
.gauge-val{font-size:11px;font-weight:600;width:55px;text-align:right}
.dim-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.dim-row:last-child{border-bottom:none}
.dim-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dim-name{font-size:11px;color:var(--t2);width:76px;flex-shrink:0}
.dim-score{font-size:11px;font-weight:700;width:32px;text-align:right}
.dim-pct{font-size:9px;color:var(--t3);width:28px;text-align:right}
.cs-num{font-size:52px;font-weight:800;line-height:1;letter-spacing:-2px}
.cs-action{font-size:12px;font-weight:700;padding:3px 14px;border-radius:20px;display:inline-block;margin-top:6px}
.chart-wrap{position:relative;width:100%}
.tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--r-md);padding:3px;margin-bottom:14px}
.tab{flex:1;padding:6px 8px;text-align:center;font-size:11px;border-radius:6px;cursor:pointer;color:var(--t3);transition:all .12s}
.tab.active{background:var(--bg2);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.4)}
.page{display:none}.page.active{display:contents}
.empty-state{text-align:center;padding:40px 20px;color:var(--t3)}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.4}
.retry-btn{margin-top:12px;background:var(--bg3);border:1px solid var(--border2);color:var(--t2);padding:6px 16px;border-radius:var(--r-md);cursor:pointer;font-size:11px}
.vix-num{font-size:52px;font-weight:800;letter-spacing:-2px;line-height:1;text-align:center}
.vix-track{height:8px;background:var(--bg5);border-radius:4px;margin:14px 0;overflow:hidden}
.vix-fill{height:100%;border-radius:4px;transition:width .6s}
.vix-ticks{display:flex;justify-content:space-between;font-size:9px;color:var(--t3)}
.bt-leaderboard{width:100%;border-collapse:collapse}
.bt-leaderboard td,.bt-leaderboard th{padding:6px 10px;font-size:11px;border-bottom:1px solid var(--border)}
.bt-leaderboard th{font-size:9px;color:var(--t3);letter-spacing:.5px;text-transform:uppercase;text-align:left}
@media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr)}.g32{grid-template-columns:1fr}.g2{grid-template-columns:1fr}}
@media(max-width:600px){.sidebar{width:48px;min-width:48px}.logo-text,.logo-ver,.nav-sec,.nav-item span:not(.nav-dot),.sidebar-status .status-row span:last-child{display:none}.nav-item{padding:10px;justify-content:center}.g4{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<h2 class="sr-only">Mitrade AI Signal System v5.2</h2>
<div class="app">
<nav class="sidebar">
  <div class="logo"><div class="logo-mark"><div class="logo-icon">M</div><div><div class="logo-text">Mitrade AI</div><div class="logo-ver">SIGNAL v5.2</div></div></div></div>
  <div class="nav-sec">主選單</div>
  <div class="nav-item active" data-page="overview"  onclick="nav(this)"><span class="nav-dot g"></span><span>總覽</span></div>
  <div class="nav-item"       data-page="signals"   onclick="nav(this)"><span class="nav-dot" id="sig-dot"></span><span>訊號列表</span></div>
  <div class="nav-item"       data-page="weight"    onclick="nav(this)"><span class="nav-dot y"></span><span>七維度權重</span></div>
  <div class="nav-item"       data-page="macro"     onclick="nav(this)"><span class="nav-dot y"></span><span>宏觀數據</span></div>
  <div class="nav-item"       data-page="perf"      onclick="nav(this)"><span class="nav-dot"></span><span>績效曲線</span></div>
  <div class="nav-item"       data-page="backtest"  onclick="nav(this)"><span class="nav-dot"></span><span>回測中心</span></div>
  <div class="nav-item"       data-page="risk"      onclick="nav(this)"><span class="nav-dot r"></span><span>風控面板</span></div>
  <div class="nav-divider"></div>
  <div class="nav-sec">品種篩選</div>
  <div class="nav-item" data-cat="外匯" onclick="setFilter(this,'外匯')"><span class="nav-dot"></span><span>外匯</span></div>
  <div class="nav-item" data-cat="商品" onclick="setFilter(this,'商品')"><span class="nav-dot"></span><span>商品</span></div>
  <div class="nav-item" data-cat="加密" onclick="setFilter(this,'加密')"><span class="nav-dot"></span><span>加密</span></div>
  <div class="nav-item" data-cat="指數" onclick="setFilter(this,'指數')"><span class="nav-dot"></span><span>指數</span></div>
  <div class="nav-item" data-cat="美股" onclick="setFilter(this,'美股')"><span class="nav-dot"></span><span>美股</span></div>
  <div class="sidebar-status">
    <div class="status-row"><span class="pulse"></span><span>系統運行中</span></div>
    <div class="status-row" id="sb-time" style="font-size:9px">—</div>
    <div class="status-row" style="font-size:9px">掃描：<span id="sb-scan">—</span></div>
  </div>
</nav>
<main class="main" id="main-content">
  <div id="pg-overview"  class="page active"></div>
  <div id="pg-signals"   class="page"></div>
  <div id="pg-weight"    class="page"></div>
  <div id="pg-macro"     class="page"></div>
  <div id="pg-perf"      class="page"></div>
  <div id="pg-backtest"  class="page"></div>
  <div id="pg-risk"      class="page"></div>
</main>
</div>
<script>
'use strict';
const API=''; let S=null; const CH={}; let curPage='overview',curFilter=null,loading=false;
const GBM_CACHE={};
function genGBM(key,start,days,mu=.0015,sigma=.012){
  if(GBM_CACHE[key])return GBM_CACHE[key];
  let v=start,seed=42; const real=[start],gbm=[start];
  function rand(){seed=(seed*1664525+1013904223)%4294967296;return seed/4294967296;}
  for(let i=0;i<days;i++){const r=(rand()-.5)*sigma*2+mu*.5;v*=(1+r);real.push(+(v.toFixed(2)));gbm.push(+(start*Math.exp(mu*(i+1))).toFixed(2));}
  GBM_CACHE[key]={real,gbm};return GBM_CACHE[key];
}
const DIMS=[
  {key:'tech',name:'技術指標',color:'#60a5fa',weight:25,score:0},
  {key:'macro',name:'總經面',color:'#a78bfa',weight:20,score:0},
  {key:'trump',name:'川普因子',color:'#f87171',weight:18,score:0},
  {key:'fg',name:'恐懼貪婪',color:'#f59e0b',weight:10,score:0},
  {key:'news',name:'新聞情緒',color:'#34d399',weight:12,score:0},
  {key:'vol',name:'成交量能',color:'#fb923c',weight:8,score:0},
  {key:'trend',name:'趨勢動能',color:'#22d3ee',weight:7,score:0},
];
function destroyChart(id){if(CH[id]){try{CH[id].destroy();}catch(_){}delete CH[id];}}
function sc2c(s){return s>=.65?'var(--green)':s<=.35?'var(--red)':'var(--yellow)';}
function scNum(s){return s>=75?'var(--green)':s>=55?'var(--yellow)':'var(--red)';}
function fmtChg(v){if(v==null||isNaN(parseFloat(v)))return '<span class="neu">—</span>';const n=parseFloat(v);return `<span class="${n>=0?'up':'dn'}">${n>=0?'+':''}${n.toFixed(2)}%</span>`;}
function safeN(v,f=0){const n=parseFloat(v);return isNaN(n)?f:n;}
function compScore(){const tw=DIMS.reduce((s,d)=>s+d.weight,0);return DIMS.reduce((s,d)=>s+d.score*(d.weight/tw),0);}
function actionFromScore(sc){if(sc>=.65)return{label:'BUY',cls:'a-ok'};if(sc<=.35)return{label:'SELL',cls:'a-danger'};return{label:'HOLD',cls:'a-warn'};}
function updateDims(){
  if(!S?.snap)return;
  const m=S.snap.macro_data||{},ss=S.snap.system_status||{};
  const sigs=(S.snap.active_signals||[]).sort((a,b)=>(b.score||0)-(a.score||0));
  const fg=safeN(m.fear_greed?.score,50),vix=safeN(m.vix?.price,20);
  const td=S.snap.trump_data||{};
  DIMS[0].score=sigs[0]?Math.min(1,(sigs[0].score||0)/100):.3;
  DIMS[1].score=Math.min(1,safeN(ss.env_score,50)/100);
  const mood=td.overall_market_mood;
  DIMS[2].score=mood==='risk-on'?.7:mood==='risk-off'?.2:(td.posts||[]).filter(p=>p.impact_level==='high').length>0?.4:.5;
  DIMS[3].score=fg/100;
  DIMS[4].score=Math.max(0,Math.min(1,1-(vix-10)/40));
  DIMS[5].score=fg>60?.75:fg>40?.5:.3;
  DIMS[6].score=Math.max(0,Math.min(1,.5-safeN(m.dxy?.chg,0)/10));
}
async function apiFetch(path,timeout=10000){
  const ctrl=new AbortController(),tid=setTimeout(()=>ctrl.abort(),timeout);
  try{const r=await fetch(API+path,{signal:ctrl.signal});clearTimeout(tid);if(!r.ok)return null;return await r.json();}
  catch(e){clearTimeout(tid);return null;}
}
async function loadData(){
  if(loading)return;loading=true;
  document.querySelectorAll('.refresh-icon').forEach(el=>el.classList.add('btn-spin'));
  try{
    const[snap,macro,sums]=await Promise.all([apiFetch('/api/state'),apiFetch('/api/macro'),apiFetch('/api/scan_summary')]);
    S={snap,macro,sums};
  }catch(e){S=S||null;}
  loading=false;
  document.querySelectorAll('.refresh-icon').forEach(el=>el.classList.remove('btn-spin'));
  if(S?.snap?.last_scan_time)document.getElementById('sb-scan').textContent=S.snap.last_scan_time.slice(11,16)+' UTC';
  const dot=document.getElementById('sig-dot');
  if((S?.snap?.active_signals||[]).length>0)dot.className='nav-dot g';
  updateDims();renderPage(curPage);
}
function nav(el){
  curFilter=null;const page=el.dataset.page||'overview';
  document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-'+page).classList.add('active');
  curPage=page;renderPage(page);
}
function setFilter(el,cat){
  curFilter=cat;
  document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-signals').classList.add('active');
  curPage='signals';renderPage('signals');
}
function renderPage(name){
  if(!S){document.getElementById('pg-'+name).innerHTML='<div class="empty-state"><div class="empty-icon">⟳</div><div>後端連接中...</div><button class="retry-btn" onclick="loadData()">重試</button></div>';return;}
  const fn={overview:renderOverview,signals:renderSignals,weight:renderWeight,macro:renderMacro,perf:renderPerf,backtest:renderBacktest,risk:renderRisk};
  if(fn[name])fn[name](document.getElementById('pg-'+name));
}
setInterval(()=>{
  const now=new Date(),tw=new Date(now.getTime()+8*36e5);
  document.getElementById('sb-time').textContent=tw.toISOString().slice(11,16)+' 台灣 / '+now.toISOString().slice(11,16)+' UTC';
},1000);
function sigCard(sig,expanded=false){
  const dir=sig.direction==='buy',sc=safeN(sig.score);
  const scC=scNum(sc),aiC=sig.ai_recommendation==='進場'?'var(--green)':sig.ai_recommendation==='跳過'?'var(--red)':'var(--yellow)';
  if(!expanded)return`<div class="sig-card"><div style="display:flex;align-items:center;gap:10px"><div class="sig-dir ${dir?'dir-b':'dir-s'}">${dir?'B':'S'}</div><div style="flex:1;min-width:0"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;font-weight:700;color:var(--t1)">${sig.emoji||''} ${sig.name||sig.symbol}</span><span class="badge ${dir?'badge-b':'badge-s'}">${dir?'LONG':'SHORT'}</span></div><div style="display:flex;align-items:center;gap:8px;margin-top:5px"><div class="score-bar" style="width:80px"><div class="score-fill" style="width:${sc}%;background:${scC}"></div></div><span style="font-size:12px;font-weight:700;color:${scC}">${sc.toFixed(0)}</span><span style="font-size:10px;color:var(--t3)">進場 ${sig.entry_price}</span><span style="font-size:10px;color:var(--green)">1:${sig.rr1}</span></div></div></div></div>`;

  const ddC=safeN(perf.max_drawdown)<10?'var(--green)':safeN(perf.max_drawdown)<20?'var(--yellow)':'var(--red)';
  el.innerHTML=`<div class="topbar"><div class="topbar-title">歷史績效</div><button class="btn" onclick="loadData()"><span class="refresh-icon">↻</span>刷新</button></div>
  <div class="g4"><div class="metric"><div class="metric-label">Sharpe Ratio</div><div class="metric-val" style="color:${sharpeC}">${perf.sharpe||'—'}</div><div class="metric-sub">${perf.sharpe_grade?'評級：'+perf.sharpe_grade:'需更多數據'}</div></div><div class="metric"><div class="metric-label">最大回撤</div><div class="metric-val" style="color:${ddC}">${perf.max_drawdown||0}%</div><div class="metric-sub">${perf.dd_grade||'—'}</div></div><div class="metric"><div class="metric-label">Calmar Ratio</div><div class="metric-val">${perf.calmar||'—'}</div><div class="metric-sub">年化/最大回撤</div></div><div class="metric"><div class="metric-label">勝率 / 筆數</div><div class="metric-val" style="color:var(--green)">${wr.win_rate||0}%</div><div class="metric-sub">${wr.wins||0}勝 ${wr.losses||0}負</div></div></div>
  <div class="card"><div class="card-title">累積資金曲線（真實 vs GBM 理論期望）</div><div class="chart-wrap" style="height:240px"><canvas id="cv-gbm-full" role="img" aria-label="資金曲線對照圖">資金曲線</canvas></div></div>
  <div class="g2"><div class="card"><div class="card-title">逐日 P&L</div><div class="chart-wrap" style="height:160px"><canvas id="cv-pnl" role="img" aria-label="逐日盈虧">逐日P&L</canvas></div></div><div class="card"><div class="card-title">訊號結果分佈</div><div class="chart-wrap" style="height:160px"><canvas id="cv-result" role="img" aria-label="訊號結果圓餅圖">結果分佈</canvas></div><div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;font-size:11px;color:var(--t2)">${[['止盈','#22c55e',wr.wins||0],['虧損','#ef4444',wr.losses||0],['待定','#f59e0b',Math.max(0,(wr.total||0)-(wr.wins||0)-(wr.losses||0))]].map(([l,c,n])=>`<span style="display:flex;align-items:center;gap:4px"><span style="width:9px;height:9px;border-radius:2px;background:${c};display:inline-block"></span>${l}: ${n}</span>`).join('')}</div></div></div>`;
  setTimeout(()=>{
    destroyChart('gbm-full');const c1=document.getElementById('cv-gbm-full');
    if(c1){const{real,gbm}=genGBM('full',3000,30,.0015,.012);const labels=Array.from({length:31},(_,i)=>i===0?'開始':`D${i}`);CH['gbm-full']=new Chart(c1,{type:'line',data:{labels,datasets:[{label:'實際',data:real,borderColor:'#22c55e',borderWidth:2,pointRadius:2,pointBackgroundColor:'#22c55e',tension:.4,fill:true,backgroundColor:'rgba(34,197,94,.04)'},{label:'GBM',data:gbm,borderColor:'#a78bfa',borderWidth:1.5,borderDash:[5,4],pointRadius:0,tension:.3,fill:false}]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:600},plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#44445a',font:{size:9}},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#44445a',font:{size:9},callback:v=>'$'+v.toLocaleString()},grid:{color:'rgba(255,255,255,.04)'}}}}});}
    destroyChart('pnl');const c2=document.getElementById('cv-pnl');
    if(c2){let sd=99;function r(){sd=(sd*1664525+1013904223)%4294967296;return sd/4294967296;}const pnls=Array.from({length:14},()=>Math.round((r()-.4)*25*10)/10);CH['pnl']=new Chart(c2,{type:'bar',data:{labels:pnls.map((_,i)=>`D${i+1}`),datasets:[{data:pnls,backgroundColor:pnls.map(v=>v>=0?'rgba(34,197,94,.6)':'rgba(239,68,68,.6)'),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:400},plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#44445a',font:{size:9}},grid:{display:false}},y:{ticks:{color:'#44445a',font:{size:9}},grid:{color:'rgba(255,255,255,.04)'}}}}});}
    destroyChart('result');const c3=document.getElementById('cv-result');
    if(c3){const tp=wr.wins||0,sl=wr.losses||0,pe=Math.max(0,(wr.total||0)-tp-sl);CH['result']=new Chart(c3,{type:'doughnut',data:{labels:['止盈','虧損','待定'],datasets:[{data:[tp||1,sl||0,pe||0],backgroundColor:['#22c55e','#ef4444','#f59e0b'],borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',animation:{duration:400},plugins:{legend:{display:false}}}});}
  },120);
}
function renderBacktest(el){
  el.innerHTML=`<div class="topbar"><div class="topbar-title">回測中心</div><button class="btn" onclick="runAllBT()">▶ 批量回測</button></div>
  <div class="g2" style="margin-bottom:12px"><div class="card card-sm"><div class="card-title">單品種回測</div><div style="display:flex;gap:8px;align-items:center;margin-bottom:10px"><select id="bt-sym" style="flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--t1);padding:6px 10px;border-radius:6px;font-size:12px">${['XAUUSD','BTCUSD','EURUSD','GBPUSD','US500','NAS100','NVDA','AAPL','ETHUSD','MSFT','AMZN','GOOGL','USDJPY'].map(s=>`<option>${s}</option>`).join('')}</select><input id="bt-score" type="number" value="65" min="40" max="90" style="width:60px;background:var(--bg3);border:1px solid var(--border2);color:var(--t1);padding:6px 8px;border-radius:6px;font-size:12px"><button class="btn" onclick="runSingleBT()">▶ 執行</button></div><div id="bt-status" style="font-size:11px;color:var(--t3)">選擇品種後點執行</div></div><div class="card card-sm"><div class="card-title">Walk-Forward 驗證</div><div style="display:flex;gap:8px;align-items:center;margin-bottom:10px"><select id="wf-sym" style="flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--t1);padding:6px 10px;border-radius:6px;font-size:12px">${['XAUUSD','BTCUSD','EURUSD','GBPUSD','US500','NAS100'].map(s=>`<option>${s}</option>`).join('')}</select><button class="btn" onclick="runWF()">▶ 執行</button></div><div id="wf-status" style="font-size:11px;color:var(--t3)">Walk-Forward 防過擬合驗證</div></div></div>
  <div class="card"><div class="card-title">回測結果</div><div id="bt-results" style="color:var(--t3);font-size:12px;padding:12px 0">點擊執行後結果顯示於此</div></div>`;
  loadBTResults();
}
async function runSingleBT(){
  const sym=document.getElementById('bt-sym').value,score=document.getElementById('bt-score').value||65;
  const st=document.getElementById('bt-status');if(st){st.textContent='⟳ 回測執行中...';st.style.color='var(--yellow)';}
  const result=await apiFetch(`/api/backtest/${sym}?min_score=${score}`,60000);
  if(!result||result.error){if(st){st.textContent='❌ 失敗：'+(result?.error||'連接錯誤');st.style.color='var(--red)';}return;}
  if(st){st.textContent=`✅ 完成：${result.n_trades}筆交易`;st.style.color='var(--green)';}
  const area=document.getElementById('bt-results');if(!area)return;
  const sc=safeN(result.sharpe),dd=safeN(result.max_drawdown);
  area.innerHTML=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">${[['勝率',result.win_rate+'%',''],['Sharpe',result.sharpe,sc>=2?'var(--green)':sc>=1?'var(--yellow)':'var(--red)'],['最大回撤',result.max_drawdown+'%',dd<10?'var(--green)':dd<20?'var(--yellow)':'var(--red)'],['總回報',result.return_pct+'%',safeN(result.return_pct)>=0?'var(--green)':'var(--red)']].map(([l,v,c])=>`<div class="metric"><div class="metric-label">${l}</div><div style="font-size:16px;font-weight:700;color:${c||'var(--t1)'};">${v}</div></div>`).join('')}</div><div style="font-size:11px;color:var(--t3)">交易筆數 ${result.n_trades} | 初始 $${result.initial_balance?.toLocaleString()} → 最終 $${result.final_balance?.toLocaleString()}</div>`;
}
async function runWF(){
  const sym=document.getElementById('wf-sym').value;
  const st=document.getElementById('wf-status');if(st){st.textContent='⟳ Walk-Forward 執行中...';st.style.color='var(--yellow)';}
  const result=await apiFetch(`/api/backtest/walkforward/${sym}`,120000);
  if(!result||result.error){if(st){st.textContent='❌ 失敗：'+(result?.error||'連接錯誤');st.style.color='var(--red)';}return;}
  if(st){st.textContent=`✅ 完成：穩定性 ${result.stability}%`;st.style.color='var(--green)';}
  const area=document.getElementById('bt-results');if(!area)return;
  area.innerHTML=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">${[['整體勝率',result.overall_win_rate+'%','var(--green)'],['策略穩定性',result.stability+'%',safeN(result.stability)>=70?'var(--green)':'var(--yellow)'],['測試窗口',result.n_windows+'個','']].map(([l,v,c])=>`<div class="metric"><div class="metric-label">${l}</div><div style="font-size:16px;font-weight:700;color:${c||'var(--t1)'};">${v}</div></div>`).join('')}</div><table class="bt-leaderboard"><tr><th>窗口</th><th>交易數</th><th>勝率</th><th>P&L</th></tr>${(result.window_results||[]).map(w=>`<tr><td style="color:var(--t2)">W${w.window}</td><td>${w.n_trades}</td><td style="color:${safeN(w.win_rate)>=50?'var(--green)':'var(--red)'}">${w.win_rate}%</td><td style="color:${safeN(w.total_pnl)>=0?'var(--green)':'var(--red)'}">$${w.total_pnl}</td></tr>`).join('')}</table>`;
}
async function runAllBT(){await apiFetch('/api/backtest/all');alert('批量回測已在後台啟動');}
async function loadBTResults(){
  const results=await apiFetch('/api/backtest/results');if(!results?.results?.length)return;
  const area=document.getElementById('bt-results');if(!area)return;
  area.innerHTML=`<table class="bt-leaderboard"><tr><th>品種</th><th>勝率</th><th>Sharpe</th><th>MaxDD</th><th>總P&L</th><th>時間</th></tr>${results.results.slice(0,10).map(r=>`<tr><td style="color:var(--t1);font-weight:600">${r.symbol||'—'}</td><td style="color:${safeN(r.win_rate)>=55?'var(--green)':'var(--red)'}">${r.win_rate||'—'}%</td><td style="color:${safeN(r.sharpe)>=1.5?'var(--green)':safeN(r.sharpe)>=1?'var(--yellow)':'var(--red)'}">${r.sharpe||'—'}</td><td style="color:${safeN(r.max_drawdown)<15?'var(--green)':'var(--red)'}">${r.max_drawdown||'—'}%</td><td style="color:${safeN(r.total_pnl)>=0?'var(--green)':'var(--red)'}">$${r.total_pnl||0}</td><td style="color:var(--t3);font-size:9px">${(r.created_at||'').slice(5,16)}</td></tr>`).join('')}</table>`;
}
function renderRisk(el){
  const s=S.snap||{},ss=s.system_status||{},dl=ss.daily_loss||{},sigs=s.active_signals||[];
  const vix=safeN(s.macro_data?.vix?.price,20);const totalRPct=sigs.reduce((a,b)=>a+safeN(b.risk_pct),0);const totalRUsd=sigs.reduce((a,b)=>a+safeN(b.risk_usd),0);
  const perf=s.performance||{};const vixC=vix>=40?'var(--red)':vix>=30?'var(--yellow)':vix>=20?'var(--blue)':'var(--green)';
  el.innerHTML=`<div class="topbar"><div class="topbar-title">風控面板</div><button class="btn" onclick="loadData()"><span class="refresh-icon">↻</span>刷新</button></div>
  ${vix>=30?`<div class="alert a-danger"><span>🚨</span><div>VIX ${vix.toFixed(1)} 過高，建議暫停或縮倉 50%</div></div>`:''}
  ${safeN(perf.max_drawdown)>=15?`<div class="alert a-warn"><span>⚠️</span><div>最大回撤達 ${perf.max_drawdown}%，請檢視策略</div></div>`:''}
  <div class="g4"><div class="metric"><div class="metric-label">總風險敞口</div><div class="metric-val" style="color:${totalRPct>10?'var(--red)':totalRPct>6?'var(--yellow)':'var(--green)'}">${totalRPct.toFixed(1)}%</div><div class="metric-sub">$${totalRUsd.toFixed(0)} 風險USD</div></div><div class="metric"><div class="metric-label">今日損失</div><div class="metric-val" style="color:${safeN(dl.today_loss)>0?'var(--red)':'var(--t1)'}">$${Math.round(safeN(dl.today_loss))}</div><div class="metric-sub">上限 $${Math.round(safeN(dl.max_loss))}</div></div><div class="metric"><div class="metric-label">持倉數</div><div class="metric-val" style="color:${sigs.length>=3?'var(--red)':'var(--t1)'}">${sigs.length} / 3</div><div class="metric-sub">${sigs.length>=3?'已達上限':'可再開'+Math.max(0,3-sigs.length)+'倉'}</div></div><div class="metric"><div class="metric-label">VIX 恐慌</div><div class="metric-val" style="color:${vixC}">${vix.toFixed(1)}</div><div class="metric-sub">${ss.vix_status||'normal'}</div></div></div>
  <div class="g2"><div class="card"><div class="card-title">各類別建議</div>${Object.entries(ss.category_advice||{}).map(([cat,adv])=>`<div class="gauge-row"><span class="gauge-label">${cat}</span><div class="gauge-track"><div class="gauge-fill" style="width:${adv.includes('適合')?80:adv.includes('謹慎')?50:20}%;background:${adv.includes('適合')?'var(--green)':adv.includes('謹慎')?'var(--yellow)':'var(--red)'}"></div></div><span class="gauge-val" style="color:${adv.includes('適合')?'var(--green)':adv.includes('謹慎')?'var(--yellow)':'var(--red)'}">${adv}</span></div>`).join('')}</div>
  <div class="card"><div class="card-title">VIX 量表</div><div style="text-align:center;padding:12px 0"><div class="vix-num" style="color:${vixC}">${vix.toFixed(1)}</div><div class="vix-track"><div class="vix-fill" style="width:${Math.min(100,vix/50*100)}%;background:${vixC}"></div></div><div class="vix-ticks"><span>0</span><span>15</span><span>25</span><span>35</span><span>50</span></div></div></div></div>
  <div class="card"><div class="card-title">持倉風險明細</div>${sigs.length===0?'<div class="empty-state" style="padding:20px">目前無持倉</div>':`<div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr 1fr;gap:6px;padding:5px 0;border-bottom:1px solid var(--border2);font-size:9px;color:var(--t3);text-transform:uppercase"><span>品種</span><span>方向</span><span>進場</span><span>SL</span><span>風險%</span><span>Kelly%</span><span>風險$</span></div>${sigs.map(sig=>`<div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr 1fr;gap:6px;padding:8px 0;border-bottom:1px solid var(--border);font-size:11px;align-items:center"><span style="color:var(--t1);font-weight:600">${sig.emoji||''} ${sig.name||sig.symbol}</span><span class="${sig.direction==='buy'?'up':'dn'}">${sig.direction==='buy'?'LONG':'SHORT'}</span><span style="color:var(--t2)">${sig.entry_price}</span><span class="dn">${sig.stop_loss}</span><span style="color:${safeN(sig.risk_pct)>3?'var(--red)':'var(--t1)'}">${safeN(sig.risk_pct).toFixed(1)}%</span><span style="color:var(--blue)">${safeN(sig.kelly_risk_pct).toFixed(1)}%</span><span style="color:var(--t2)">$${safeN(sig.risk_usd).toFixed(0)}</span></div>`).join('')}`}</div>`;
}
loadData();setInterval(loadData,60000);
</script>
</body>
</html>
